<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주식의 신 - v46.0 Fast Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Inter:wght@400;600;800;900&display=swap');
        
        :root {
            --bg-base: #000000;
            --bg-panel: #0a0a0a;
            --bg-card: #141414;
            --primary: #fbbf24;
            --up: #ff3344;
            --down: #3388ff;
            --border: #1f1f1f;
            --text-main: #ffffff;
            --text-dim: #777777;
        }

        * { box-sizing: border-box; outline: none; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; background: var(--bg-base); color: var(--text-main); font-family: 'Inter', sans-serif; overflow: hidden; }

        /* Grid 레이아웃 */
        #app-grid { display: none; grid-template-columns: 260px 1fr 320px; width: 100vw; height: 100vh; }

        .col { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .col-left { border-right: 1px solid var(--border); background: var(--bg-panel); }
        .col-center { background: var(--bg-base); }
        .col-right { border-left: 1px solid var(--border); background: var(--bg-panel); }

        .panel-header { padding: 20px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
        .panel-footer { padding: 20px; border-top: 1px solid var(--border); flex-shrink: 0; background: var(--bg-panel); }
        .scroll-area { flex: 1; overflow-y: auto; padding: 10px; min-height: 0; }

        /* 컴포넌트 */
        .stock-card { padding: 15px; margin-bottom: 8px; border-radius: 8px; background: var(--bg-card); cursor: pointer; border: 1px solid transparent; transition: 0.15s ease; }
        .stock-card:hover { background: #1a1a1a; }
        .stock-card.active { border-color: var(--primary); background: #1a1a1a; }
        .port-card { padding: 15px; margin-bottom: 10px; border-radius: 8px; background: var(--bg-card); display: flex; justify-content: space-between; align-items: center; border: 1px solid #1a1a1a; }

        .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: 900; cursor: pointer; font-size: 1.1rem; transition: 0.1s; display: flex; justify-content: center; align-items: center; }
        .btn:active { transform: scale(0.98); }
        .btn-up { background: var(--up); color: #fff; }
        .btn-down { background: var(--down); color: #fff; }
        
        input[type="number"], input[type="text"] { width: 100%; background: #000; border: 1px solid #333; color: #fff; padding: 15px; text-align: center; font-size: 1.3rem; border-radius: 8px; font-weight: 900; }
        
        /* 입력 폼 전용 스타일 */
        .input-user { font-size: 1.1rem !important; padding: 12px !important; border-color: #222 !important; text-align: left !important; font-family: 'Inter', sans-serif; }
        .input-user:focus { border-color: var(--primary) !important; }

        /* 중앙 차트 */
        .chart-top-bar { display: flex; justify-content: space-between; align-items: center; padding: 25px 40px; border-bottom: 1px solid var(--border); flex-shrink: 0; background: linear-gradient(to bottom, #111, #000); }
        .chart-wrapper { flex: 1; padding: 20px; position: relative; min-height: 0; }
        canvas { width: 100% !important; height: 100% !important; }

        /* 텍스트 & 모달 */
        .t-dim { color: var(--text-dim); font-size: 0.8rem; font-weight: 800; letter-spacing: 1px; }
        .t-up { color: var(--up); } .t-down { color: var(--down); }
        .t-price { font-size: 4.5rem; font-weight: 900; letter-spacing: -2px; line-height: 1; }
        .t-diff { font-size: 1.6rem; font-weight: 800; padding: 5px 12px; border-radius: 6px; display: inline-block; margin-top: 10px; }

        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
        .toast { background: rgba(20,20,20,0.95); border-left: 4px solid var(--primary); padding: 15px 25px; border-radius: 8px; font-weight: 800; box-shadow: 0 5px 20px rgba(0,0,0,0.8); animation: slideIn 0.3s forwards, fadeOut 0.3s 2.7s forwards; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes fadeOut { to { opacity: 0; } }

        .modal-overlay { position: fixed; inset: 0; z-index: 1000; display: none; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.95); backdrop-filter: blur(5px); }
        .modal-box { width: 550px; padding: 40px; background: #0a0a0a; border: 1px solid #333; border-radius: 20px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body>

<div id="toast-container"></div>

<!-- 주식의 신 테마 로그인 로비 -->
<div id="lobby" class="modal-overlay" style="display:flex;">
    <h1 style="font-family:'Black Han Sans'; font-size:7.5rem; color:var(--primary); margin-bottom:10px;">주식의 신</h1>
    <p class="t-dim" style="letter-spacing:8px; margin-bottom:40px;">⚡ FAST EDITION v46.0</p>
    
    <div style="width: 320px; display: flex; flex-direction: column; gap: 15px; margin-bottom: 30px;">
        <div>
            <label class="t-dim" style="display:block; text-align:left; margin-bottom:5px;">STUDENT ID (학번)</label>
            <input type="text" id="user-student-id" class="input-user" placeholder="예: 30101" maxlength="10">
        </div>
        <div>
            <label class="t-dim" style="display:block; text-align:left; margin-bottom:5px;">NAME (이름)</label>
            <input type="text" id="user-name" class="input-user" placeholder="예: 홍길동" maxlength="10">
        </div>
    </div>

    <button class="btn" style="width:320px; background:var(--primary); color:#000;" onclick="Engine.tryStart()">INVEST START</button>
</div>

<div id="day-overlay" class="modal-overlay">
    <div class="modal-box" style="width: 600px;">
        <h2 style="color:var(--primary); font-weight:900; margin-bottom:20px;">MARKET CLOSED</h2>
        <div id="news-list" style="margin-bottom:25px;"></div>
        
        <div style="background:#000; padding:20px; border-radius:12px; border:1px solid #222; text-align:left;">
            <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                <span class="t-dim">RESERVABLE CASH</span>
                <span id="res-avail-cash" class="t-up" style="font-weight:900;">₩0</span>
            </div>
            <select id="res-target" style="width:100%; padding:12px; background:#111; color:#fff; border:1px solid #333; border-radius:8px; margin-bottom:10px; outline:none; font-weight:bold;"></select>
            <div style="display:flex; gap:10px;">
                <input type="number" id="res-qty" value="10" min="1" style="margin:0; padding:10px; font-size:1.1rem; flex:1;">
                <button class="btn btn-up" style="width:80px; padding:10px;" onclick="Reservation.add('buy')">매수</button>
                <button class="btn btn-down" style="width:80px; padding:10px;" onclick="Reservation.add('sell')">매도</button>
            </div>
            <div id="res-log" style="margin-top:15px; font-size:0.85rem; color:#888; border-top:1px solid #222; padding-top:10px; max-height:100px; overflow-y:auto;">예약된 내역이 없습니다.</div>
        </div>
        <button class="btn" style="background:#fff; color:#000; margin-top:25px;" onclick="Engine.nextDay()">다음 날 개장</button>
    </div>
</div>

<div id="result-overlay" class="modal-overlay">
    <div class="modal-box" style="border-color:var(--primary);">
        <h1 style="color:var(--primary); font-family:'Black Han Sans'; font-size:3rem; margin-bottom:5px;">INVESTMENT REPORT</h1>
        <p class="t-dim"><span id="ui-res-user" style="color:#fff;"></span>님의 15일 투자가 종료되었습니다.</p>
        <div style="margin:30px 0; background:#000; padding:30px; border-radius:12px; border:1px solid #222;">

            <div id="final-asset" style="font-size:2.5rem; font-weight:900; color:#fff;">₩0</div>
            <div id="final-profit" style="font-size:1.2rem; font-weight:900; margin-top:5px;">+0.00%</div>
            <hr style="border-top:1px solid #222; margin:20px 0;">
            <div class="t-dim" style="margin-bottom:5px;">최종 랭크</div>
            <div id="final-rank" style="font-size:4rem; font-family:'Black Han Sans'; color:var(--primary);">RANK -</div>
            <div id="final-rank-name" style="font-weight:900; color:var(--primary); letter-spacing:3px;">-</div>
        </div>
        <button class="btn" style="background:#fff; color:#000;" onclick="location.reload()">새로운 투자 시작</button>
    </div>
</div>

<div id="app-grid">
    <aside class="col col-left">
        <div class="panel-header">
            <div style="color:var(--primary); font-weight:900; font-size:0.85rem;">DAY <span id="ui-day">1</span> / 15</div>
            <div style="font-weight:900; font-size:1.2rem; margin-top:5px; color:#fff;">MARKET LIST</div>
        </div>
        <div class="scroll-area" id="ui-stock-list"></div>
    </aside>

    <main class="col col-center">
        <div class="chart-top-bar">
            <div>
                <div id="ui-cur-name" style="font-weight:900; color:#888; letter-spacing:2px; font-size:1rem;">STOCK</div>
                <div id="ui-cur-price" class="t-price">0</div>
                <div id="ui-cur-diff" class="t-diff">0.00%</div>
            </div>
            <div style="text-align:right;">
                <div class="t-dim">REMAINING</div>
                <div id="ui-timer" style="font-size:3.5rem; font-weight:900; color:var(--primary);">15s</div>
            </div>
        </div>
        <div class="chart-wrapper"><canvas id="chart-canvas"></canvas></div>
    </main>

    <aside class="col col-right">
        <div class="panel-header">
            <!-- 투자자 정보 상단 고정 표기 -->
            <div style="background: #111; padding: 12px; border-radius: 6px; border: 1px solid #222; margin-bottom: 15px;">

                <div id="ui-profile-display" style="font-weight: 900; font-size: 1rem; color: var(--primary);">00000 누구나</div>
            </div>
            <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:5px;">
                <span class="t-dim">CASH</span>
            </div>
            <div id="ui-cash" style="font-size:1.8rem; font-weight:900; color:#fff;">₩10,000,000</div>
            <div class="t-dim" style="margin-top:20px; margin-bottom:5px;">NET WORTH</div>
            <div id="ui-total-asset" style="font-size:1.8rem; font-weight:900; color:var(--primary);">₩10,000,000</div>
        </div>
        <div class="scroll-area" id="ui-portfolio"></div>
        <div class="panel-footer">
            <input type="number" id="trade-qty" value="10" min="1" style="margin-bottom:10px;">
            <div style="display:flex; gap:10px;">
                <button class="btn btn-up" onclick="Trading.execute('buy')">매수</button>
                <button class="btn btn-down" onclick="Trading.execute('sell')">매도</button>
            </div>
        </div>
    </aside>
</div>

function showToast(msg, type = 'error') {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    toast.className = `toast`; toast.style.borderLeftColor = type === 'success' ? '#00ff88' : 'var(--up)';
    toast.innerText = msg; container.appendChild(toast);
    setTimeout(() => { if(toast.parentElement) toast.remove(); }, 3000);
}

    "HMM": { price: 19000, cat: "유통/운송" },
    "이마트": { price: 72000, cat: "유통/운송" },
    "쿠팡": { price: 26000, cat: "유통/운송" },
    "비트코인": { price: 88000000, cat: "암호화폐" },
    "이더리움": { price: 4600000, cat: "암호화폐" },
    "도지코인": { price: 250, cat: "암호화폐" },
    "한화에어로스페이스": { price: 215000, cat: "방산" }
};

const Stocks = {
    list: {},
    names: Object.keys(InitialStockData), // 동적 이름 맵핑
    init() {
        this.names.forEach(n => {
            const data = InitialStockData[n];
            const p = data.price;
            const cat = data.cat;
            // 고정 가격 기반으로 시작, 변동성은 약간의 무작위성 부여
            const r = (Math.random() * 0.03) + 0.015; 
            this.list[n] = { 
                name: n, price: p, basePrice: p, cat: cat,
                history: Array(60).fill(p), volume: Array(60).fill(0), 
                owned: 0, avgPrice: 0, vol: r 
            };
        });
    },
    update(v) {
        Object.values(this.list).forEach(s => {
            const finalVol = s.vol + (v * 0.3);
            s.price = Math.max(10, Math.floor(s.price * (1 + (Math.random() * finalVol * 2 - finalVol))));
            s.history.push(s.price); s.history.shift();
            s.volume.push(Math.floor(Math.random() * 1000 * (1 + finalVol * 10))); s.volume.shift();
        });
    }
};

const Trading = {
    cash: 10000000,
    getTotalAsset() {
        const stockValue = Object.values(Stocks.list).reduce((acc, s) => acc + (s.price * s.owned), 0);
        return this.cash + stockValue; 
    },
    execute(type) {
        const s = Stocks.list[Engine.currentStock], qty = parseInt(document.getElementById('trade-qty').value);
        if(!s || isNaN(qty) || qty <= 0) return;
        const total = s.price * qty;
        if(type === 'buy') {
            if(this.cash < total) return showToast("주문 거부: 현금이 부족합니다.");
            this.cash -= total; s.avgPrice = ((s.avgPrice * s.owned) + total) / (s.owned + qty); s.owned += qty;
        } else {
            if(s.owned < qty) return showToast("주문 거부: 보유 수량이 부족합니다.");
            this.cash += total; s.owned -= qty; if(s.owned === 0) s.avgPrice = 0;
        }
        UI.render();
    }
};

const Reservation = {
    queue: [],
    getReservedCash() { return this.queue.reduce((acc, q) => q.type === 'buy' ? acc + (Stocks.list[q.name].price * q.qty) : acc, 0); },
    add(type) {
        const name = document.getElementById('res-target').value, qty = parseInt(document.getElementById('res-qty').value);
        if(isNaN(qty) || qty <= 0) return;
        const s = Stocks.list[name], cost = s.price * qty;
        if(type === 'buy') {
            if((Trading.cash - this.getReservedCash()) < cost) return showToast("예약 실패: 가용 현금 부족");
        } else {
            const alreadySell = this.queue.reduce((acc, q) => (q.name === name && q.type === 'sell') ? acc + q.qty : acc, 0);
            if(s.owned < (alreadySell + qty)) return showToast("예약 실패: 매도 가능 수량 초과");
        }
        this.queue.push({ name, qty, type }); this.updateUI();
    },
    updateUI() {
        document.getElementById('res-avail-cash').innerText = "₩" + (Trading.cash - this.getReservedCash()).toLocaleString();
        const log = document.getElementById('res-log');
        if(this.queue.length === 0) log.innerText = "예약된 내역이 없습니다.";
        else log.innerHTML = this.queue.map(q => `• [${q.type==='buy'?'매수':'매도'}] ${q.name} ${q.qty}주`).join('<br>');
    },
    process() {
        this.queue.forEach(q => {
            const s = Stocks.list[q.name], total = s.price * q.qty;
            if(q.type === 'buy' && Trading.cash >= total) { Trading.cash -= total; s.avgPrice = ((s.avgPrice * s.owned) + total) / (s.owned + q.qty); s.owned += q.qty; } 
            else if(q.type === 'sell' && s.owned >= q.qty) { Trading.cash += total; s.owned -= q.qty; if(s.owned === 0) s.avgPrice = 0; }
        });
        this.queue = [];
    }
};

const UI = {
    chart: null,
    init() {
        const ctx = document.getElementById('chart-canvas').getContext('2d');
        this.chart = new Chart(ctx, {
            data: { 
                labels: Array(60).fill(''), 
                datasets: [
                    { type: 'bar', data: [], backgroundColor: d => d.raw && d.raw[1] >= d.raw[0] ? '#ff3344' : '#3388ff', barPercentage: 0.85, yAxisID: 'y' },
                    { type: 'bar', data: [], backgroundColor: 'rgba(255, 255, 255, 0.1)', barPercentage: 0.85, yAxisID: 'yVol' }
                ] 
            },
            options: { 
                responsive: true, maintainAspectRatio: false, 
                scales: { 
                    x: { display: false }, 
                    y: { position: 'right', grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#666', font:{weight:'bold'} } },
                    yVol: { display: false, min: 0, max: 8000 }
                }, 
                plugins: { legend: false }, animation: false 
            }
        });
        const sel = document.getElementById('res-target');
        Stocks.names.forEach(n => sel.innerHTML += `<option value="${n}">${n}</option>`);
        this.renderStockList();
    },
    renderStockList() {
        const container = document.getElementById('ui-stock-list'); container.innerHTML = '';
        Object.values(Stocks.list).forEach(s => {
            const div = document.createElement('div');
            div.className = `stock-card ${s.name === Engine.currentStock ? 'active' : ''}`;
            div.onclick = () => { Engine.currentStock = s.name; this.renderStockList(); this.updateChart(true); };
            div.innerHTML = `<div style="margin-bottom:6px; font-weight:800; color:#ccc;">${s.name}</div><div id="price-tag-${s.name}" style="font-size:1.1rem; font-weight:900;">${s.price.toLocaleString()}</div>`;
            container.appendChild(div);
        });
    },
    updateChart(force = false) {
        const s = Stocks.list[Engine.currentStock]; if(!s) return;
        const diff = ((s.price - s.basePrice) / s.basePrice * 100).toFixed(2);
        
        document.getElementById('ui-cur-name').innerText = s.name;
        document.getElementById('ui-cur-price').innerText = s.price.toLocaleString();
        
        const diffEl = document.getElementById('ui-cur-diff');
        diffEl.innerText = (diff >= 0 ? '+' : '') + diff + '%';
        diffEl.className = 't-diff ' + (diff >= 0 ? 'btn-up' : 'btn-down');

        this.chart.data.datasets[0].data = s.history.map((v, i) => [i === 0 ? v : s.history[i-1], v]);
        this.chart.data.datasets[1].data = s.volume;
        
        this.chart.options.scales.y.min = Math.min(...s.history) * 0.995;
        this.chart.options.scales.y.max = Math.max(...s.history) * 1.005;
        this.chart.update(force ? 'default' : 'none');
    },
    render() {
        document.getElementById('ui-cash').innerText = "₩" + Trading.cash.toLocaleString();

        const port = document.getElementById('ui-portfolio'); port.innerHTML = '';
        Object.values(Stocks.list).forEach(s => {
            if(s.owned > 0) {
                const profit = ((s.price - s.avgPrice) / s.avgPrice * 100).toFixed(2);
                port.innerHTML += `<div class="port-card">
                    <span><b style="font-size:0.95rem; color:#eee;">${s.name}</b><br><small class="t-dim">${s.owned}주 / ₩${Math.floor(s.avgPrice).toLocaleString()}</small></span>
                    <span class="${profit>=0?'t-up':'t-down'}" style="font-weight:900; font-size:1.1rem;">${profit}%</span></div>`;
            }
            const el = document.getElementById(`price-tag-${s.name}`);
            if(el) { el.innerText = s.price.toLocaleString(); el.style.color = s.price >= s.basePrice ? 'var(--up)' : 'var(--down)'; }
        });
        document.getElementById('ui-total-asset').innerText = "₩" + Trading.getTotalAsset().toLocaleString();
        document.getElementById('ui-day').innerText = Engine.day;
        document.getElementById('ui-timer').innerText = Engine.timeLeft + "s";
    }
};

const Engine = {
    day: 1, timeLeft: 15, isLive: false, currentStock: '삼성전자',
    studentId: '', userName: '',

    tryStart() {
        const idInput = document.getElementById('user-student-id').value.trim();
        const nameInput = document.getElementById('user-name').value.trim();

        if(!idInput || !nameInput) {
            return showToast('학번과 이름을 모두 입력해 주세요.');
        }

        this.studentId = idInput;
        this.userName = nameInput;

        document.getElementById('ui-profile-display').innerText = `${this.studentId} ${this.userName}`;
        document.getElementById('ui-res-user').innerText = `${this.studentId} ${this.userName}`;

        this.start();
    },

    start() {
        this.globalVol = 0.04; 
        this.maxTime = 15;
        
        Stocks.init(); UI.init(); this.resetDay();
        document.getElementById('lobby').style.display = 'none'; 
        document.getElementById('app-grid').style.display = 'grid'; 
        this.isLive = true; 
        setInterval(() => this.tick(), 800); 
    },
    resetDay() { this.timeLeft = this.maxTime; Object.values(Stocks.list).forEach(s => s.basePrice = s.price); },
    tick() { if(!this.isLive) return; this.timeLeft--; if(this.timeLeft <= 0) return this.endDay(); Stocks.update(this.globalVol); UI.updateChart(); UI.render(); },
    endDay() {
        this.isLive = false;
        if(this.day >= 15) return this.showResult();
        
        const list = document.getElementById('news-list'); list.innerHTML = '';
        const shuffled = Stocks.names.sort(() => 0.5 - Math.random()).slice(0, 3);
        
        shuffled.forEach(n => {
            const up = Math.random() > 0.45; 
            const s = Stocks.list[n];
            s.nextM = up ? (1 + (Math.random() * 0.1 * (1 + s.vol*3))) : (1 - (Math.random() * 0.1 * (1 + s.vol*3)));
            
            // 3. 종목 카테고리에 맞는 전용 뉴스 생성
            const catNews = NewsDB[s.cat];
            const newsArr = up ? catNews.good : catNews.bad;
            const newsText = newsArr[Math.floor(Math.random() * newsArr.length)];

            list.innerHTML += `<div style="text-align:left; padding:15px; background:#000; border-radius:10px; margin-bottom:10px; border-left:4px solid ${up?'var(--up)':'var(--down)'}">
                <b class="${up?'t-up':'t-down'}">[${n}]</b> ${newsText}</div>`;
        });
        Reservation.updateUI(); document.getElementById('day-overlay').style.display = 'flex';
    },
    nextDay() {
        Object.values(Stocks.list).forEach(s => { if(s.nextM) { s.price = Math.max(10, Math.floor(s.price * s.nextM)); s.nextM = null; } });
        Reservation.process(); this.day++; this.resetDay();
        document.getElementById('day-overlay').style.display = 'none'; this.isLive = true; UI.render(); UI.updateChart(true);
    },
    showResult() {
        const total = Trading.getTotalAsset();
        const profit = ((total - 10000000) / 10000000 * 100).toFixed(2);
        let rank = "F", name = "한강 지망생", color = "#ff3344";
        
        // 4. 원래의 극악 난이도(기존 랭크 기준)로 복구
        if(total >= 1000000000) { rank="S"; name="주식의 신"; color="#fbbf24"; }     // 10억
        else if(total >= 100000000) { rank="A"; name="워렌 버핏"; color="#fbbf24"; }  // 1억
        else if(total >= 30000000) { rank="B"; name="성공한 투자자"; color="#fff"; }   // 3,000만
        else if(total >= 10000000) { rank="C"; name="본전 개미"; color="#666"; }       // 1,000만
        
        document.getElementById('final-asset').innerText = "₩" + total.toLocaleString();
        document.getElementById('final-profit').innerText = (profit >= 0 ? '+' : '') + profit + "%";
        document.getElementById('final-profit').className = profit >= 0 ? 't-up' : 't-down';
        document.getElementById('final-rank').innerText = "RANK " + rank; document.getElementById('final-rank').style.color = color;
        document.getElementById('final-rank-name').innerText = name; document.getElementById('final-rank-name').style.color = color;
        document.getElementById('result-overlay').style.display = 'flex';
    }
};
</script>
