<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주식의 신 - v44.2 Layout Fixed</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Inter:wght@400;700;900&display=swap');
        
        :root {
            --bg-deep: #030303;
            --bg-panel: #0d0d0d;
            --primary: #fbbf24;
            --up: #ff3344;
            --down: #3388ff;
            --border: #222;
            --glass: rgba(15, 15, 15, 0.98);
        }

        * { box-sizing: border-box; outline: none; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg-deep); color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; }

        /* 토스트 알림 */
        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 30000; display: flex; flex-direction: column; gap: 10px; }
        .toast { background: var(--glass); border-left: 4px solid var(--primary); padding: 15px 25px; border-radius: 8px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); font-size: 0.9rem; font-weight: 700; animation: slideIn 0.3s ease, fadeOut 0.3s ease 2.7s forwards; }
        .toast.error { border-left-color: var(--up); }
        .toast.success { border-left-color: #00ff88; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes fadeOut { to { opacity: 0; transform: translateY(-10px); } }

        /* 레이아웃 */
        #game-container { display: none; width: 100vw; height: 100vh; flex-direction: row; }
        .sidebar-left { width: 220px; background: var(--bg-panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 10; }
        
        .main-viewport { flex: 1; display: flex; flex-direction: column; background: #050505; }
        .price-header { padding: 30px 40px; display: flex; justify-content: space-between; background: var(--bg-panel); border-bottom: 1px solid var(--border); flex-shrink: 0; }
        .chart-container { flex: 1; width: 100%; padding: 20px; position: relative; min-height: 0; }
        canvas { width: 100% !important; height: 100% !important; }
        
        /* [핵심 수정] 우측 사이드바 구조 최적화 */
        .sidebar-right { width: 300px; background: var(--bg-panel); border-left: 1px solid var(--border); display: flex; flex-direction: column; z-index: 10; height: 100vh; }
        .panel-section { padding: 20px; border-bottom: 1px solid var(--border); background: var(--bg-panel); flex-shrink: 0; } /* 패널 압축 방지 */
        #ui-portfolio { flex: 1; overflow-y: auto; padding: 20px; min-height: 0; } /* 포트폴리오만 스크롤 되도록 min-height 설정 */

        /* UI 컴포넌트 */
        .stock-card { padding: 12px 15px; margin: 4px 10px; border-radius: 8px; background: #151515; cursor: pointer; border: 1px solid transparent; transition: 0.2s; display: flex; flex-direction: column; font-size: 0.85rem; }
        .stock-card:hover { background: #1a1a1a; }
        .stock-card.active { border-color: var(--primary); background: #1a1a1a; box-shadow: inset 0 0 10px rgba(251,191,36,0.05); }
        
        #ui-cur-price { font-size: 5rem; font-weight: 900; letter-spacing: -3px; line-height: 1; margin-top: 10px; }
        #ui-cur-diff { font-size: 1.6rem; font-weight: 800; padding: 5px 15px; border-radius: 8px; display: inline-block; margin-top: 10px; }
        #ui-timer { font-size: 3rem; font-weight: 900; color: var(--primary); text-shadow: 0 0 15px rgba(251,191,36,0.3); }

        /* 버튼 & 입력창 여백 줄임 (작은 화면 대응) */
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: 900; cursor: pointer; font-size: 1rem; transition: 0.2s; display: flex; justify-content: center; align-items: center; }
        .btn:active { transform: scale(0.97); }
        .btn-sm { padding: 10px; font-size: 0.9rem; } 

        input[type="number"] { width: 100%; background: #000; border: 1px solid #333; color: #fff; padding: 12px; text-align: center; font-size: 1.2rem; border-radius: 8px; font-weight: 900; margin-bottom: 10px; }
        input[type="number"].input-sm { padding: 10px; font-size: 1.1rem; margin: 0; } 

        /* 모달 및 로비 */
        .modal-overlay { position: fixed; inset: 0; z-index: 10000; display: none; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.92); backdrop-filter: blur(5px); }
        .modal-content { width: 500px; padding: 40px; background: var(--glass); border: 1px solid #333; border-radius: 20px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        .news-item { text-align: left; padding: 15px; background: #000; border-radius: 10px; margin-bottom: 10px; border-left: 5px solid #333; font-size: 0.9rem; }
        
        .up { color: var(--up); }
        .down { color: var(--down); }
        .bg-up { background: rgba(255,51,68,0.15); color: var(--up); }
        .bg-down { background: rgba(51,136,255,0.15); color: var(--down); }
        .dim { color: #666; }
    </style>
</head>
<body>

<div id="toast-container"></div>

<div id="lobby" class="modal-overlay" style="display:flex;">
    <h1 style="font-family:'Black Han Sans'; font-size:8rem; color:var(--primary); margin:0; text-shadow: 0 0 30px rgba(251,191,36,0.3);">주식의 신</h1>
    <p style="color:#555; font-weight:900; letter-spacing:8px; margin-bottom:40px;">PRO TRADER v44.2</p>
    <div style="display:flex; gap:20px;">
        <button class="btn" style="width:220px; background:#222; color:#fff;" onclick="Engine.start('normal')">NORMAL</button>
        <button class="btn" style="width:220px; background:var(--up); color:#fff;" onclick="Engine.start('fast')">⚡ FAST</button>
    </div>
</div>

<div id="bank-overlay" class="modal-overlay">
    <div class="modal-content" style="width:400px;">
        <h2 style="color:var(--primary); margin-top:0; margin-bottom:20px;">🏦 제1금융권</h2>
        <p class="dim" style="font-size:0.85rem; margin-bottom:20px;">매일 장 마감 시 대출 원금의 <b>2%</b>가 이자로 차감됩니다.</p>
        
        <div style="background:#000; padding:25px; border-radius:15px; margin-bottom:25px; border:1px solid #222;">
            <div class="dim" style="font-size:0.8rem; font-weight:900; margin-bottom:5px;">현재 대출 잔액</div>
            <div id="bank-loan-amount" style="font-size:2.5rem; font-weight:900; color:var(--up);">₩0</div>
        </div>
        
        <div style="display:flex; gap:10px; margin-bottom:15px;">
            <button class="btn btn-sm" style="background:#222; color:#fff;" onclick="Bank.borrow()">+ 100만 대출</button>
            <button class="btn btn-sm" style="background:#222; color:#fff;" onclick="Bank.repay()">- 100만 상환</button>
        </div>
        <button class="btn" style="background:var(--primary); color:#000;" onclick="Bank.close()">은행 나가기</button>
    </div>
</div>

<div id="day-overlay" class="modal-overlay">
    <div class="modal-content" style="width:550px;">
        <h2 style="color:var(--primary); margin-top:0; margin-bottom:20px; font-weight:900;">DAILY REPORT</h2>
        <div id="news-list"></div>
        
        <div style="background:#050505; padding:20px; border-radius:15px; margin-top:20px; border:1px solid #222;">
            <div style="display:flex; justify-content:space-between; margin-bottom:15px; font-size:0.8rem; font-weight:900;">
                <span class="dim">예약 가능 현금</span>
                <span id="res-available-cash" class="up">₩0</span>
            </div>
            <select id="res-target" style="width:100%; padding:12px; background:#111; color:#fff; border:1px solid #333; border-radius:8px; margin-bottom:10px; outline:none; font-size:1rem;"></select>
            
            <div style="display:flex; gap:10px; align-items:stretch;">
                <input type="number" id="res-qty" class="input-sm" value="10" min="1" style="flex:1;">
                <button class="btn btn-sm" style="width:80px; background:var(--up); color:#fff;" onclick="Reservation.add('buy')">매수</button>
                <button class="btn btn-sm" style="width:80px; background:var(--down); color:#fff;" onclick="Reservation.add('sell')">매도</button>
            </div>
            <div id="res-log" style="font-size:0.8rem; color:#888; margin-top:15px; text-align:left; border-top:1px solid #222; padding-top:10px; max-height:80px; overflow-y:auto;"></div>
        </div>
        <button class="btn" style="background:#fff; color:#000; margin-top:25px;" onclick="Engine.nextDay()">다음 날 개장</button>
    </div>
</div>

<div id="result-overlay" class="modal-overlay">
    <div class="modal-content" style="border-color:var(--primary); box-shadow: 0 0 80px rgba(251,191,36,0.2);">
        <h1 style="color:var(--primary); font-family:'Black Han Sans'; font-size:3rem; margin-top:0;">INVESTMENT REPORT</h1>
        <p class="dim" style="font-weight:900; letter-spacing:3px;">30일 투자가 종료되었습니다.</p>
        <div style="margin:30px 0; background:#000; padding:30px; border-radius:15px; border:1px solid #222;">
            <div style="font-size:0.9rem; color:#555; margin-bottom:10px;">최종 평가 자산 (대출 상환 후)</div>
            <div id="final-asset" style="font-size:2.5rem; font-weight:900; color:#fff;">₩0</div>
            <div id="final-profit" style="font-size:1.2rem; font-weight:800; margin-top:5px;">+0.00%</div>
            <hr style="border:0; border-top:1px solid #222; margin:20px 0;">
            <div style="font-size:0.9rem; color:#555; margin-bottom:5px;">당신의 최종 랭크</div>
            <div id="final-rank" style="font-size:4.5rem; font-family:'Black Han Sans'; color:var(--primary);">RANK -</div>
            <div id="final-rank-name" style="font-weight:900; color:var(--primary); letter-spacing:5px; margin-top:5px;">-</div>
        </div>
        <button class="btn" style="background:#fff; color:#000;" onclick="location.reload()">다시 시작</button>
    </div>
</div>

<div id="game-container">
    <aside class="sidebar-left">
        <div class="panel-section">
            <div style="color:var(--primary); font-weight:900; font-size:0.8rem;">DAY <span id="ui-day">1</span> / 30</div>
            <div style="font-weight:900; margin-top:5px;">MARKET LIST</div>
        </div>
        <div id="ui-stock-list" style="overflow-y:auto; flex:1; padding:10px 0;"></div>
    </aside>

    <main class="main-viewport">
        <div class="price-header">
            <div>
                <div id="ui-cur-name" style="font-weight:900; color:#666; letter-spacing:4px;">STOCK</div>
                <div id="ui-cur-price">0</div>
                <div id="ui-cur-diff" class="bg-up">0.00%</div>
            </div>
            <div style="text-align:right;">
                <div class="dim" style="font-size:0.8rem; font-weight:900;">TIME LEFT</div>
                <div id="ui-timer">20s</div>
            </div>
        </div>
        <div class="chart-container"><canvas id="chart-canvas"></canvas></div>
    </main>

    <aside class="sidebar-right">
        <div class="panel-section">
            <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:5px;">
                <span class="dim" style="font-size:0.75rem; font-weight:900;">CASH</span>
                <span id="ui-loan-display" style="font-size:0.7rem; color:var(--up); font-weight:900; display:none;">대출: ₩0</span>
            </div>
            <div id="ui-cash" style="font-size:1.6rem; font-weight:900;">₩10,000,000</div>
            <p class="dim" style="font-size:0.75rem; font-weight:900; margin-top:15px; margin-bottom:5px;">NET WORTH</p>
            <div id="ui-total-asset" style="font-size:1.6rem; font-weight:900; color:var(--primary);">₩10,000,000</div>
            
            <button class="btn btn-sm" style="margin-top:15px; background:transparent; color:var(--primary); border:1px solid var(--primary);" onclick="Bank.open()">🏦 은행 업무 (대출/상환)</button>
        </div>
        
        <div id="ui-portfolio"></div>
        
        <div class="panel-section" style="background:#050505;">
            <input type="number" id="trade-qty" value="10" min="1">
            <div style="display:flex; gap:10px;">
                <button class="btn" style="background:var(--up); color:#fff;" onclick="Trading.execute('buy')">매수</button>
                <button class="btn" style="background:var(--down); color:#fff;" onclick="Trading.execute('sell')">매도</button>
            </div>
        </div>
    </aside>
</div>

<script>
// 유틸리티
function showToast(msg, type = 'error') {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    toast.className = `toast ${type}`; toast.innerText = msg;
    container.appendChild(toast);
    setTimeout(() => { if(toast.parentElement) toast.remove(); }, 3000);
}

const Stocks = {
    list: {},
    data: [
        { n: "삼성전자", p: [60000, 85000], r: 0.012 }, { n: "SK하이닉스", p: [120000, 180000], r: 0.028 },
        { n: "현대차", p: [200000, 260000], r: 0.015 }, { n: "기아", p: [80000, 120000], r: 0.018 },
        { n: "테슬라", p: [200000, 400000], r: 0.045 }, { n: "엔비디아", p: [300000, 600000], r: 0.035 },
        { n: "애플", p: [250000, 350000], r: 0.015 }, { n: "구글", p: [180000, 250000], r: 0.02 },
        { n: "마이크로소프트", p: [400000, 500000], r: 0.015 }, { n: "에코프로", p: [100000, 200000], r: 0.055 },
        { n: "LG엔솔", p: [350000, 450000], r: 0.025 }, { n: "삼성SDI", p: [400000, 500000], r: 0.02 },
        { n: "포스코홀딩스", p: [300000, 500000], r: 0.025 }, { n: "NAVER", p: [180000, 240000], r: 0.02 },
        { n: "카카오", p: [45000, 65000], r: 0.03 }, { n: "카카오뱅크", p: [20000, 30000], r: 0.035 },
        { n: "셀트리온", p: [150000, 200000], r: 0.03 }, { n: "신풍제약", p: [5000, 15000], r: 0.15 },
        { n: "루닛", p: [40000, 80000], r: 0.08 }, { n: "알테오젠", p: [150000, 250000], r: 0.07 },
        { n: "하이브", p: [150000, 250000], r: 0.04 }, { n: "JYP", p: [50000, 90000], r: 0.045 },
        { n: "넷플릭스", p: [400000, 700000], r: 0.03 }, { n: "엔씨소프트", p: [180000, 300000], r: 0.05 },
        { n: "크래프톤", p: [200000, 280000], r: 0.035 }, { n: "펄어비스", p: [30000, 50000], r: 0.04 },
        { n: "넥슨", p: [20000, 40000], r: 0.035 }, { n: "대한항공", p: [20000, 30000], r: 0.018 },
        { n: "HMM", p: [15000, 25000], r: 0.035 }, { n: "이마트", p: [70000, 90000], r: 0.02 },
        { n: "쿠팡", p: [20000, 35000], r: 0.03 }, { n: "비트코인", p: [3000, 8000], r: 0.08 },
        { n: "이더리움", p: [200, 600], r: 0.09 }, { n: "도지코인", p: [10, 100], r: 0.15 },
        { n: "한화에어로스페이스", p: [150000, 200000], r: 0.03 }
    ],
    init() {
        this.data.forEach(item => {
            const startPrice = Math.floor(Math.random() * (item.p[1] - item.p[0])) + item.p[0];
            this.list[item.n] = {
                name: item.n, price: startPrice, basePrice: startPrice,
                history: Array(60).fill(startPrice), volume: Array(60).fill(0),
                owned: 0, avgPrice: 0, vol: item.r
            };
        });
    },
    update(v) {
        Object.values(this.list).forEach(s => {
            const finalVol = s.vol + (v * 0.3);
            s.price = Math.max(10, Math.floor(s.price * (1 + (Math.random() * finalVol * 2 - finalVol))));
            s.history.push(s.price); s.history.shift();
            s.volume.push(Math.floor(Math.random() * 1000 * (1 + finalVol * 10))); s.volume.shift();
        });
    }
};

const Bank = {
    loan: 0, interestRate: 0.02,
    open() { this.updateUI(); document.getElementById('bank-overlay').style.display = 'flex'; },
    close() { document.getElementById('bank-overlay').style.display = 'none'; },
    updateUI() { document.getElementById('bank-loan-amount').innerText = "₩" + this.loan.toLocaleString(); },
    borrow() {
        Trading.cash += 1000000; this.loan += 1000000;
        showToast('100만 원 대출 승인', 'success');
        this.updateUI(); UI.render();
    },
    repay() {
        if(this.loan <= 0) return showToast('상환할 대출금이 없습니다.');
        if(Trading.cash < 1000000) return showToast('현금이 부족합니다.');
        Trading.cash -= 1000000; this.loan -= 1000000;
        showToast('100만 원 상환 완료', 'success');
        this.updateUI(); UI.render();
    },
    chargeInterest() {
        if(this.loan > 0) {
            const interest = Math.floor(this.loan * this.interestRate);
            Trading.cash -= interest;
            showToast(`대출 이자 ₩${interest.toLocaleString()} 차감`);
        }
    }
};

const Trading = {
    cash: 10000000,
    getTotalAsset() {
        const stockValue = Object.values(Stocks.list).reduce((acc, s) => acc + (s.price * s.owned), 0);
        return this.cash + stockValue - Bank.loan; 
    },
    execute(type) {
        const s = Stocks.list[Engine.currentStock], qty = parseInt(document.getElementById('trade-qty').value);
        if(!s || isNaN(qty) || qty <= 0) return;
        const total = s.price * qty;
        if(type === 'buy') {
            if(this.cash < total) return showToast("현금이 부족합니다!");
            this.cash -= total;
            s.avgPrice = ((s.avgPrice * s.owned) + total) / (s.owned + qty);
            s.owned += qty;
        } else {
            if(s.owned < qty) return showToast("보유 수량이 부족합니다!");
            this.cash += total; s.owned -= qty; if(s.owned === 0) s.avgPrice = 0;
        }
        UI.render();
    }
};

const Reservation = {
    queue: [],
    getReservedCash() { return this.queue.reduce((acc, q) => q.type === 'buy' ? acc + (Stocks.list[q.name].price * q.qty) : acc, 0); },
    add(type) {
        const name = document.getElementById('res-target').value, qty = parseInt(document.getElementById('res-qty').value);
        if(isNaN(qty) || qty <= 0) return;
        const s = Stocks.list[name], cost = s.price * qty;

        if(type === 'buy') {
            if((Trading.cash - this.getReservedCash()) < cost) return showToast("예약 가능 현금이 부족합니다!");
        } else {
            const alreadySell = this.queue.reduce((acc, q) => (q.name === name && q.type === 'sell') ? acc + q.qty : acc, 0);
            if(s.owned < (alreadySell + qty)) return showToast("보유 주식이 부족합니다!");
        }
        this.queue.push({ name, qty, type }); this.updateUI();
    },
    updateUI() {
        document.getElementById('res-available-cash').innerText = "₩" + (Trading.cash - this.getReservedCash()).toLocaleString();
        document.getElementById('res-log').innerHTML = this.queue.map(q => `• [${q.type==='buy'?'매수':'매도'}] ${q.name} ${q.qty}주`).join('<br>');
    },
    process() {
        this.queue.forEach(q => {
            const s = Stocks.list[q.name], total = s.price * q.qty;
            if(q.type === 'buy' && Trading.cash >= total) { Trading.cash -= total; s.avgPrice = ((s.avgPrice * s.owned) + total) / (s.owned + q.qty); s.owned += q.qty; } 
            else if(q.type === 'sell' && s.owned >= q.qty) { Trading.cash += total; s.owned -= q.qty; if(s.owned === 0) s.avgPrice = 0; }
        });
        this.queue = [];
    }
};

const UI = {
    chart: null,
    init() {
        const ctx = document.getElementById('chart-canvas').getContext('2d');
        this.chart = new Chart(ctx, {
            data: { 
                labels: Array(60).fill(''), 
                datasets: [
                    { type: 'bar', data: [], backgroundColor: d => d.raw && d.raw[1] >= d.raw[0] ? '#ff3344' : '#3388ff', barPercentage: 0.9, yAxisID: 'y' },
                    { type: 'bar', data: [], backgroundColor: 'rgba(255, 255, 255, 0.08)', barPercentage: 0.9, yAxisID: 'yVol' }
                ] 
            },
            options: { 
                responsive: true, maintainAspectRatio: false, 
                scales: { 
                    x: { display: false }, 
                    y: { position: 'right', grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#555' } },
                    yVol: { display: false, min: 0, max: 8000 }
                }, 
                plugins: { legend: false }, animation: false 
            }
        });
        const sel = document.getElementById('res-target');
        Stocks.data.forEach(d => sel.innerHTML += `<option value="${d.n}">${d.n}</option>`);
        this.renderStockList();
    },
    renderStockList() {
        const container = document.getElementById('ui-stock-list'); container.innerHTML = '';
        Object.values(Stocks.list).forEach(s => {
            const div = document.createElement('div');
            div.className = `stock-card ${s.name === Engine.currentStock ? 'active' : ''}`;
            div.onclick = () => { Engine.currentStock = s.name; this.renderStockList(); this.updateChart(true); };
            div.innerHTML = `<div style="margin-bottom:4px;"><b style="color:#ddd">${s.name}</b></div><div id="price-tag-${s.name}" style="font-size:1.1rem; font-weight:900;">${s.price.toLocaleString()}</div>`;
            container.appendChild(div);
        });
    },
    updateChart(force = false) {
        const s = Stocks.list[Engine.currentStock]; if(!s) return;
        const diff = ((s.price - s.basePrice) / s.basePrice * 100).toFixed(2);
        
        document.getElementById('ui-cur-name').innerText = s.name;
        document.getElementById('ui-cur-price').innerText = s.price.toLocaleString();
        
        const diffEl = document.getElementById('ui-cur-diff');
        diffEl.innerText = (diff >= 0 ? '+' : '') + diff + '%';
        diffEl.className = diff >= 0 ? 'bg-up' : 'bg-down';

        this.chart.data.datasets[0].data = s.history.map((v, i) => [i === 0 ? v : s.history[i-1], v]);
        this.chart.data.datasets[1].data = s.volume;
        
        this.chart.options.scales.y.min = Math.min(...s.history) * 0.995;
        this.chart.options.scales.y.max = Math.max(...s.history) * 1.005;
        this.chart.update(force ? 'default' : 'none');
    },
    render() {
        document.getElementById('ui-cash').innerText = "₩" + Trading.cash.toLocaleString();
        
        const loanEl = document.getElementById('ui-loan-display');
        if(Bank.loan > 0) { loanEl.style.display = 'block'; loanEl.innerText = `대출금: ₩${Bank.loan.toLocaleString()}`; } 
        else { loanEl.style.display = 'none'; }

        const port = document.getElementById('ui-portfolio'); port.innerHTML = '';
        Object.values(Stocks.list).forEach(s => {
            if(s.owned > 0) {
                const profit = ((s.price - s.avgPrice) / s.avgPrice * 100).toFixed(2);
                port.innerHTML += `<div style="display:flex; justify-content:space-between; margin-bottom:10px; background:#111; padding:12px; border-radius:8px;">
                    <span><b style="font-size:0.9rem">${s.name}</b><br><small class="dim">${s.owned}주 / ₩${Math.floor(s.avgPrice).toLocaleString()}</small></span>
                    <span class="${profit>=0?'up':'down'}" style="font-weight:900; align-self:center;">${profit}%</span></div>`;
            }
            const el = document.getElementById(`price-tag-${s.name}`);
            if(el) { el.innerText = s.price.toLocaleString(); el.style.color = s.price >= s.basePrice ? 'var(--up)' : 'var(--down)'; }
        });
        document.getElementById('ui-total-asset').innerText = "₩" + Trading.getTotalAsset().toLocaleString();
        document.getElementById('ui-day').innerText = Engine.day;
        document.getElementById('ui-timer').innerText = Engine.timeLeft + "s";
    }
};

const Engine = {
    day: 1, timeLeft: 20, isLive: false, currentStock: '삼성전자',
    start(mode) {
        this.globalVol = mode === 'fast' ? 0.04 : 0.015; this.maxTime = mode === 'fast' ? 15 : 30;
        Stocks.init(); UI.init(); this.resetDay();
        document.getElementById('lobby').style.display = 'none'; document.getElementById('game-container').style.display = 'flex';
        this.isLive = true; setInterval(() => this.tick(), mode === 'fast' ? 800 : 1500);
    },
    resetDay() { this.timeLeft = this.maxTime; Object.values(Stocks.list).forEach(s => s.basePrice = s.price); },
    tick() { if(!this.isLive) return; this.timeLeft--; if(this.timeLeft <= 0) return this.endDay(); Stocks.update(this.globalVol); UI.updateChart(); UI.render(); },
    endDay() {
        this.isLive = false;
        if(this.day >= 30) return this.showResult();
        
        Bank.chargeInterest(); 

        const list = document.getElementById('news-list'); list.innerHTML = '';
        Stocks.data.sort(() => 0.5 - Math.random()).slice(0, 3).forEach(d => {
            const up = Math.random() > 0.45; const s = Stocks.list[d.n];
            s.nextM = up ? (1 + (Math.random() * 0.1 * (1 + s.vol*3))) : (1 - (Math.random() * 0.1 * (1 + s.vol*3)));
            list.innerHTML += `<div class="news-item" style="border-left-color:${up?'var(--up)':'var(--down)'}"><b class="${up?'up':'down'}">[${d.n}]</b> ${up?'시장 전망 상회하는 호재 발생':'리스크 부각으로 인한 투심 악화'}</div>`;
        });
        Reservation.updateUI(); document.getElementById('day-overlay').style.display = 'flex';
    },
    nextDay() {
        Object.values(Stocks.list).forEach(s => { if(s.nextM) { s.price = Math.max(10, Math.floor(s.price * s.nextM)); s.nextM = null; } });
        Reservation.process(); this.day++; this.resetDay();
        document.getElementById('day-overlay').style.display = 'none'; this.isLive = true; UI.render(); UI.updateChart(true);
    },
    showResult() {
        const total = Trading.getTotalAsset();
        const profit = ((total - 10000000) / 10000000 * 100).toFixed(2);
        let rank = "F", name = "한강 지망생", color = "#ff3344";
        if(total >= 1000000000) { rank="S"; name="주식의 신"; color="#fbbf24"; }
        else if(total >= 100000000) { rank="A"; name="워렌 버핏"; color="#fbbf24"; }
        else if(total >= 30000000) { rank="B"; name="성공한 투자자"; color="#fff"; }
        else if(total >= 10000000) { rank="C"; name="본전 개미"; color="#666"; }
        document.getElementById('final-asset').innerText = "₩" + total.toLocaleString();
        document.getElementById('final-profit').innerText = (profit >= 0 ? '+' : '') + profit + "%";
        document.getElementById('final-profit').className = profit >= 0 ? 'up' : 'down';
        document.getElementById('final-rank').innerText = "RANK " + rank; document.getElementById('final-rank').style.color = color;
        document.getElementById('final-rank-name').innerText = name; document.getElementById('final-rank-name').style.color = color;
        document.getElementById('result-overlay').style.display = 'flex';
    }
};
</script>
</body>
</html>
