<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주식의 신 - v40.0 Real Market</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Inter:wght@400;700;900&display=swap');
        
        :root {
            --bg-deep: #050505;
            --bg-panel: #0f0f0f;
            --primary: #fbbf24;
            --up: #ff3344;
            --down: #3388ff;
            --border: #222;
        }

        * { box-sizing: border-box; outline: none; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--bg-deep); color: #fff; 
            font-family: 'Inter', sans-serif; overflow: hidden; 
        }

        #game-container { display: none; width: 100vw; height: 100vh; flex-direction: row; }

        /* 좌측: 종목 리스트 */
        .sidebar-left { 
            width: 200px; background: var(--bg-panel); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; 
        }
        
        /* 중앙: 차트 */
        .main-viewport { flex: 1; display: flex; flex-direction: column; background: #000; position: relative; }

        .price-header { 
            padding: 30px 40px; display: flex; justify-content: space-between;
            background: linear-gradient(180deg, rgba(0,0,0,0.9) 0%, transparent 100%);
            position: absolute; top: 0; left: 0; width: 100%; z-index: 10;
        }

        .chart-container { flex: 1; width: 100%; padding-top: 120px; position: relative; }
        canvas { width: 100% !important; height: 100% !important; }

        /* 우측: 거래 및 자산 */
        .sidebar-right { 
            width: 280px; background: var(--bg-panel); border-left: 1px solid var(--border);
            display: flex; flex-direction: column; 
        }

        /* UI 컴포넌트 */
        .stock-card {
            padding: 12px 15px; margin: 4px 8px; border-radius: 6px; background: #151515;
            cursor: pointer; border: 1px solid transparent; transition: 0.1s;
            display: flex; flex-direction: column; font-size: 0.85rem;
        }
        .stock-card.active { border-color: var(--primary); background: #222; }
        .stock-card .info-row { display: flex; justify-content: space-between; margin-bottom: 2px; }
        .tier-tag { font-size: 0.65rem; font-weight: 900; padding: 2px 5px; border-radius: 3px; background: #333; }

        #ui-cur-price { font-size: 5.5rem; font-weight: 900; letter-spacing: -4px; line-height: 0.9; margin-top: 10px; }
        #ui-cur-diff { font-size: 2rem; font-weight: 800; }
        #ui-timer { font-size: 3.5rem; font-weight: 900; color: var(--up); text-shadow: 0 0 20px rgba(255,51,68,0.3); }

        .trading-panel { padding: 25px; background: #0a0a0a; border-top: 1px solid var(--border); }
        .btn { width: 100%; padding: 18px; border: none; border-radius: 10px; font-weight: 900; cursor: pointer; font-size: 1.1rem; }
        input[type="number"] { width: 100%; background: #111; border: 1px solid #333; color: #fff; padding: 15px; margin-bottom: 12px; text-align: center; font-size: 1.4rem; border-radius: 10px; }

        /* 모달 및 로비 */
        #lobby, #modal-overlay { position: fixed; inset: 0; z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.96); }
        .modal-content { width: 550px; padding: 40px; background: #111; border: 1px solid #333; border-radius: 30px; text-align: center; }
        .news-item { text-align: left; padding: 15px; background: #050505; border-radius: 12px; margin-bottom: 10px; border-left: 5px solid #333; font-size: 0.9rem; }
        
        .up { color: var(--up); }
        .down { color: var(--down); }
        .dim { color: #555; }
    </style>
</head>
<body>

<div id="lobby">
    <h1 style="font-family:'Black Han Sans'; font-size:7rem; color:var(--primary); margin:0;">주식의 신</h1>
    <p style="color:#555; font-weight:900; letter-spacing:8px; margin-bottom:40px;">REAL MARKET v40.0</p>
    <div style="display:flex; gap:20px;">
        <button class="btn" style="width:220px; background:#222; color:#fff;" onclick="Engine.start('normal')">NORMAL</button>
        <button class="btn" style="width:220px; background:var(--up); color:#fff;" onclick="Engine.start('fast')">⚡ FAST</button>
    </div>
</div>

<div id="modal-overlay" style="display:none;">
    <div class="modal-content">
        <h2 style="color:var(--primary); margin-bottom:20px; font-weight:900;">DAILY REPORT</h2>
        <div id="news-list"></div>
        
        <div style="background:#0a0a0a; padding:20px; border-radius:20px; margin-top:20px; border:1px solid #222;">
            <div style="display:flex; justify-content:space-between; margin-bottom:15px; font-size:0.8rem; font-weight:900;">
                <span class="dim">RESERVABLE CASH</span>
                <span id="res-available-cash" class="up">₩0</span>
            </div>
            <select id="res-target" style="width:100%; padding:15px; background:#111; color:#fff; border:1px solid #333; border-radius:10px; margin-bottom:10px;"></select>
            <div style="display:flex; gap:10px;">
                <input type="number" id="res-qty" value="10" style="flex:1; margin:0;">
                <button class="btn" style="width:80px; background:var(--up); font-size:0.8rem; padding:0;" onclick="Reservation.add('buy')">BUY</button>
                <button class="btn" style="width:80px; background:var(--down); font-size:0.8rem; padding:0;" onclick="Reservation.add('sell')">SELL</button>
            </div>
            <div id="res-log" style="font-size:0.8rem; color:#888; margin-top:15px; text-align:left; border-top:1px solid #222; padding-top:10px; max-height:100px; overflow-y:auto;"></div>
        </div>
        <button class="btn" style="background:#fff; color:#000; margin-top:30px;" onclick="Engine.nextDay()">OPEN MARKET</button>
    </div>
</div>

<div id="game-container">
    <aside class="sidebar-left">
        <div style="padding:25px 20px; border-bottom:1px solid var(--border);">
            <div style="color:var(--primary); font-weight:900; font-size:0.8rem;">DAY <span id="ui-day">1</span></div>
            <div style="font-weight:900; margin-top:5px;">MARKET</div>
        </div>
        <div id="ui-stock-list" style="overflow-y:auto; flex:1; padding:10px 0;"></div>
    </aside>

    <main class="main-viewport">
        <div class="price-header">
            <div>
                <div id="ui-cur-name" style="font-weight:900; color:#444; letter-spacing:4px;">STOCK</div>
                <div id="ui-cur-price">0</div>
                <div id="ui-cur-diff">0.00%</div>
            </div>
            <div style="text-align:right;">
                <div class="dim" style="font-size:0.8rem; font-weight:900;">TIME LEFT</div>
                <div id="ui-timer">30s</div>
            </div>
        </div>
        <div class="chart-container"><canvas id="chart-canvas"></canvas></div>
    </main>

    <aside class="sidebar-right">
        <div style="padding:30px 25px; border-bottom:1px solid var(--border);">
            <p class="dim" style="font-size:0.75rem; font-weight:900; margin-bottom:5px;">CASH</p>
            <div id="ui-cash" style="font-size:1.6rem; font-weight:900;">₩10,000,000</div>
            <p class="dim" style="font-size:0.75rem; font-weight:900; margin-top:20px; margin-bottom:5px;">NET WORTH</p>
            <div id="ui-total-asset" style="font-size:1.6rem; font-weight:900; color:var(--primary);">₩10,000,000</div>
        </div>
        <div id="ui-portfolio" style="flex:1; overflow-y:auto; padding:25px;"></div>
        <div class="trading-panel">
            <input type="number" id="trade-qty" value="10">
            <div style="display:flex; gap:10px;">
                <button class="btn" style="background:var(--up); color:#fff;" onclick="Trading.execute('buy')">매수</button>
                <button class="btn" style="background:var(--down); color:#fff;" onclick="Trading.execute('sell')">매도</button>
            </div>
        </div>
    </aside>
</div>

<script>
// [1. 시장 데이터 모듈 - 현실적인 시가 및 변동성 설정]
const Stocks = {
    list: {},
    data: [
        { n: "삼성전자", p: [60000, 85000], r: 0.012, t: "안정" },
        { n: "엔비디아", p: [300000, 600000], r: 0.035, t: "성장" },
        { n: "테슬라", p: [200000, 400000], r: 0.045, t: "성장" },
        { n: "에코프로", p: [100000, 200000], r: 0.055, t: "고위험" },
        { n: "비트코인", p: [3000, 8000], r: 0.08, t: "초고위험" },
        { n: "도지코인", p: [100, 900], r: 0.12, t: "투기" },
        { n: "애플", p: [250000, 350000], r: 0.015, t: "안정" },
        { n: "NAVER", p: [180000, 240000], r: 0.02, t: "보통" },
        { n: "카카오", p: [45000, 65000], r: 0.03, t: "보통" },
        { n: "넥슨", p: [20000, 40000], r: 0.035, t: "보통" },
        { n: "하이브", p: [150000, 250000], r: 0.04, t: "성장" },
        { n: "대한항공", p: [20000, 30000], r: 0.018, t: "안정" },
        { n: "이마트", p: [70000, 90000], r: 0.02, t: "보통" },
        { n: "쿠팡", p: [20000, 35000], r: 0.03, t: "성장" },
        { n: "포스코", p: [300000, 500000], r: 0.025, t: "보통" },
        { n: "엔씨소프트", p: [180000, 300000], r: 0.05, t: "고위험" },
        { n: "SK하이닉스", p: [120000, 180000], r: 0.028, t: "성장" },
        { n: "현대차", p: [200000, 260000], r: 0.015, t: "안정" },
        { n: "넷플릭스", p: [400000, 700000], r: 0.03, t: "성장" },
        { n: "신풍제약", p: [5000, 15000], r: 0.15, t: "투기" }
    ],
    init() {
        this.data.forEach(item => {
            const p = Math.floor(Math.random() * (item.p[1] - item.p[0])) + item.p[0];
            this.list[item.n] = { name: item.n, price: p, basePrice: p, history: Array(60).fill(p), owned: 0, avgPrice: 0, vol: item.r, tier: item.t };
        });
    },
    update(globalVol) {
        Object.values(this.list).forEach(s => {
            const finalVol = s.vol + (globalVol * 0.3);
            s.price = Math.max(10, Math.floor(s.price * (1 + (Math.random() * finalVol * 2 - finalVol))));
            s.history.push(s.price); s.history.shift();
        });
    }
};

// [2. 거래 모듈 - 실시간 체결 및 자산 관리]
const Trading = {
    cash: 10000000,
    execute(type) {
        const s = Stocks.list[Engine.currentStock], qty = parseInt(document.getElementById('trade-qty').value);
        if(!s || isNaN(qty) || qty <= 0) return;
        const total = s.price * qty;
        if(type === 'buy') {
            if(this.cash < total) return alert("현금이 부족합니다!");
            this.cash -= total;
            s.avgPrice = ((s.avgPrice * s.owned) + total) / (s.owned + qty);
            s.owned += qty;
        } else {
            if(s.owned < qty) return alert("보유 수량이 부족합니다!");
            this.cash += total; s.owned -= qty; if(s.owned === 0) s.avgPrice = 0;
        }
        UI.render();
    }
};

// [3. 예약 시스템 - 뉴스 반영 및 자산 보호 검증]
const Reservation = {
    queue: [],
    getReservedCash() {
        return this.queue.reduce((acc, q) => q.type === 'buy' ? acc + (Stocks.list[q.name].price * q.qty) : acc, 0);
    },
    add(type) {
        const name = document.getElementById('res-target').value, qty = parseInt(document.getElementById('res-qty').value);
        if(isNaN(qty) || qty <= 0) return;
        const s = Stocks.list[name], cost = s.price * qty;

        if(type === 'buy') {
            const avail = Trading.cash - this.getReservedCash();
            if(avail < cost) return alert("예약 가능 현금이 부족합니다!");
        } else {
            const alreadySell = this.queue.reduce((acc, q) => (q.name === name && q.type === 'sell') ? acc + q.qty : acc, 0);
            if(s.owned < (alreadySell + qty)) return alert("보유 주식이 부족합니다!");
        }

        this.queue.push({ name, qty, type });
        this.updateUI();
    },
    updateUI() {
        document.getElementById('res-available-cash').innerText = "₩" + (Trading.cash - this.getReservedCash()).toLocaleString();
        document.getElementById('res-log').innerHTML = this.queue.map(q => `• [${q.type==='buy'?'매수':'매도'}] ${q.name} ${q.qty}주`).join('<br>');
    },
    process() {
        this.queue.forEach(q => {
            const s = Stocks.list[q.name], total = s.price * q.qty;
            if(q.type === 'buy' && Trading.cash >= total) {
                Trading.cash -= total; s.avgPrice = ((s.avgPrice * s.owned) + total) / (s.owned + q.qty); s.owned += q.qty;
            } else if(q.type === 'sell' && s.owned >= q.qty) {
                Trading.cash += total; s.owned -= q.qty;
            }
        });
        this.queue = [];
    }
};

// [4. 시각화 모듈 - 정밀 차트 및 UI 렌더링]
const UI = {
    chart: null,
    init() {
        const ctx = document.getElementById('chart-canvas').getContext('2d');
        this.chart = new Chart(ctx, {
            type: 'bar',
            data: { labels: Array(60).fill(''), datasets: [{ data: [], backgroundColor: d => d.raw && d.raw[1] >= d.raw[0] ? '#ff3344' : '#3388ff', barPercentage: 0.95, categoryPercentage: 1.0 }] },
            options: { 
                responsive: true, maintainAspectRatio: false, 
                scales: { x: { display: false }, y: { position: 'right', grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#555', font: { weight: 'bold' } } } }, 
                plugins: { legend: false }, animation: false 
            }
        });
        const sel = document.getElementById('res-target');
        Stocks.data.forEach(d => sel.innerHTML += `<option value="${d.n}">${d.n}</option>`);
        this.renderStockList();
    },
    renderStockList() {
        const container = document.getElementById('ui-stock-list'); container.innerHTML = '';
        Object.values(Stocks.list).forEach(s => {
            const div = document.createElement('div');
            div.className = `stock-card ${s.name === Engine.currentStock ? 'active' : ''}`;
            div.onclick = () => { Engine.currentStock = s.name; this.renderStockList(); this.updateChart(true); };
            div.innerHTML = `
                <div class="info-row"><b>${s.name}</b> <span class="tier-tag">${s.tier}</span></div>
                <div id="price-tag-${s.name}" style="font-weight:700;">${s.price.toLocaleString()}</div>
            `;
            container.appendChild(div);
        });
    },
    updateChart(force = false) {
        const s = Stocks.list[Engine.currentStock]; if(!s) return;
        const diff = ((s.price - s.basePrice) / s.basePrice * 100).toFixed(2);
        document.getElementById('ui-cur-name').innerText = s.name;
        document.getElementById('ui-cur-price').innerText = s.price.toLocaleString();
        document.getElementById('ui-cur-diff').innerText = (diff >= 0 ? '+' : '') + diff + '%';
        document.getElementById('ui-cur-diff').className = diff >= 0 ? 'up' : 'down';
        this.chart.data.datasets[0].data = s.history.map((v, i) => [i === 0 ? v : s.history[i-1], v]);
        this.chart.options.scales.y.min = Math.min(...s.history) * 0.997;
        this.chart.options.scales.y.max = Math.max(...s.history) * 1.003;
        this.chart.update(force ? 'default' : 'none');
    },
    render() {
        document.getElementById('ui-cash').innerText = "₩" + Trading.cash.toLocaleString();
        let total = Trading.cash;
        const port = document.getElementById('ui-portfolio'); port.innerHTML = '';
        Object.values(Stocks.list).forEach(s => {
            total += s.price * s.owned;
            if(s.owned > 0) {
                const profit = ((s.price - s.avgPrice) / s.avgPrice * 100).toFixed(2);
                port.innerHTML += `<div style="display:flex; justify-content:space-between; margin-bottom:12px; font-size:0.85rem;">
                    <span><b>${s.name}</b><br><small class="dim">${s.owned}주 / ₩${Math.floor(s.avgPrice).toLocaleString()}</small></span>
                    <span class="${profit>=0?'up':'down'}">${profit}%</span></div>`;
            }
            const el = document.getElementById(`price-tag-${s.name}`);
            if(el) { el.innerText = s.price.toLocaleString(); el.className = s.price >= s.basePrice ? 'up' : 'down'; }
        });
        document.getElementById('ui-total-asset').innerText = "₩" + total.toLocaleString();
        document.getElementById('ui-day').innerText = Engine.day;
        document.getElementById('ui-timer').innerText = Engine.timeLeft + "s";
    }
};

// [5. 메인 게임 엔진 - 시간 흐름 및 이벤트 제어]
const Engine = {
    day: 1, timeLeft: 30, isLive: false, currentStock: '삼성전자',
    start(mode) {
        this.globalVol = mode === 'fast' ? 0.05 : 0.02;
        this.maxTime = mode === 'fast' ? 15 : 30;
        Stocks.init(); UI.init(); this.resetDay();
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('game-container').style.display = 'flex';
        this.isLive = true; setInterval(() => this.tick(), mode === 'fast' ? 800 : 1500);
    },
    resetDay() { this.timeLeft = this.maxTime; Object.values(Stocks.list).forEach(s => s.basePrice = s.price); },
    tick() { if(!this.isLive) return; this.timeLeft--; if(this.timeLeft <= 0) return this.endDay(); Stocks.update(this.globalVol); UI.updateChart(); UI.render(); },
    endDay() {
        this.isLive = false;
        const list = document.getElementById('news-list'); list.innerHTML = '';
        Stocks.data.sort(() => 0.5 - Math.random()).slice(0, 3).forEach(d => {
            const up = Math.random() > 0.45;
            const s = Stocks.list[d.n];
            // 위험도가 높은 종목일수록 뉴스 영향력이 커짐
            const power = 1 + (s.vol * 5);
            s.nextM = up ? (1 + (Math.random() * 0.1 * power)) : (1 - (Math.random() * 0.1 * power));
            list.innerHTML += `<div class="news-item" style="border-left-color:${up?'var(--up)':'var(--down)'}">
                <b class="${up?'up':'down'}">[${d.n}]</b> ${up?'차세대 기술 독점 계약 체결 및 수출 호조':'내부 횡령 의혹 및 실적 전망 하향 조정'}
            </div>`;
        });
        Reservation.updateUI();
        document.getElementById('modal-overlay').style.display = 'flex';
    },
    nextDay() {
        Object.values(Stocks.list).forEach(s => { if(s.nextM) { s.price = Math.max(10, Math.floor(s.price * s.nextM)); s.nextM = null; } });
        Reservation.process();
        this.day++; if(this.day > 30) { alert("30일 투자 종료! 최종 자산: " + document.getElementById('ui-total-asset').innerText); location.reload(); }
        this.resetDay(); document.getElementById('modal-overlay').style.display = 'none';
        this.isLive = true; UI.render(); UI.updateChart(true);
    }
};
</script>
</body>
</html>
