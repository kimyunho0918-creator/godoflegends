<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주식의 신 - ULTIMATE EDITION</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Inter:wght@400;600;800;900&family=JetBrains+Mono:wght@700;800&display=swap');
        
        :root {
            --bg-deep: #05070a; --bg-panel: #11141d; --bg-card: #1a1e2b;
            --primary: #f6b819; --primary-hover: #ffd050;
            --up: #f6465d; --down: #3388ff;
            --border: #242938; --text-main: #f0f2f5; --text-dim: #848e9c;
        }

        * { box-sizing: border-box; outline: none; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; background: var(--bg-deep); color: var(--text-main); font-family: 'Inter', sans-serif; overflow: hidden; }
        ::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-thumb { background: #33394a; border-radius: 5px; }

        .btn { padding: 14px; border: none; border-radius: 8px; font-weight: 800; cursor: pointer; transition: 0.2s; text-transform: uppercase; font-size: 0.95rem; }
        .btn:active { transform: scale(0.97); }
        .btn-primary { background: var(--primary); color: #000; }
        .btn-up { background: rgba(246,70,93,0.1); color: var(--up); border: 1px solid var(--up); }
        .btn-down { background: rgba(51,136,255,0.1); color: var(--down); border: 1px solid var(--down); }
        .btn-loan { background: transparent; color: #a855f7; border: 1px solid #a855f7; }

        input[type="number"], select { width: 100%; background: #05070a; border: 1px solid var(--border); color: #fff; padding: 12px; margin-bottom: 10px; text-align: center; font-size: 1.1rem; border-radius: 8px; font-family: 'JetBrains Mono', monospace; }

        #app-layout { display: none; width: 100vw; height: 100vh; flex-direction: column; }
        
        /* News Ticker */
        .ticker-wrap { width: 100%; height: 35px; background: var(--primary); color: #000; display: flex; align-items: center; overflow: hidden; font-weight: 900; font-size: 0.9rem; letter-spacing: 1px; }
        .ticker-move { display: inline-block; white-space: nowrap; animation: ticker 20s linear infinite; }
        @keyframes ticker { 0% { transform: translate3d(100vw, 0, 0); } 100% { transform: translate3d(-100%, 0, 0); } }

        .main-container { display: flex; flex: 1; height: calc(100vh - 35px); }

        /* Left: Market */
        .sidebar-left { width: 300px; background: var(--bg-panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 5; }
        .stock-card { padding: 15px; margin: 5px 10px; border-radius: 8px; background: var(--bg-card); cursor: pointer; border: 1px solid transparent; transition: 0.1s; display: flex; justify-content: space-between; align-items: center;}
        .stock-card:hover { border-color: #33394a; }
        .stock-card.active { border-color: var(--primary); background: rgba(246,184,25,0.05); }
        .tier-tag { font-size: 0.65rem; font-weight: 800; padding: 3px 5px; border-radius: 4px; background: rgba(255,255,255,0.1); color: var(--text-dim); }

        /* Center: Chart */
        .center-viewport { flex: 1; display: flex; flex-direction: column; position: relative; }
        .price-header { padding: 30px 40px; display: flex; justify-content: space-between; align-items: center; background: linear-gradient(180deg, rgba(5,7,10,0.95) 0%, transparent 100%); position: absolute; top: 0; width: 100%; z-index: 10; pointer-events: none; }
        #ui-cur-price { font-family: 'JetBrains Mono', monospace; font-size: 5rem; font-weight: 800; letter-spacing: -2px; line-height: 1; margin: 5px 0; }
        #ui-timer { font-family: 'JetBrains Mono', monospace; font-size: 3.5rem; font-weight: 800; color: var(--primary); }
        .chart-container { flex: 1; padding: 130px 20px 20px; }

        /* Right: Assets & Leaderboard */
        .sidebar-right { width: 340px; background: var(--bg-panel); border-left: 1px solid var(--border); display: flex; flex-direction: column; z-index: 5; }
        .panel-section { padding: 20px; border-bottom: 1px solid var(--border); }
        .asset-val { font-family: 'JetBrains Mono', monospace; font-size: 1.6rem; font-weight: 800; }
        .port-item { display: flex; justify-content: space-between; padding: 10px; background: var(--bg-card); border-radius: 8px; margin-bottom: 5px; font-size: 0.85rem; }
        
        .leaderboard-item { display: flex; justify-content: space-between; padding: 8px 10px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.85rem; }
        .leaderboard-item:nth-child(1) { color: var(--primary); font-weight: 900; }

        /* Modals & Admin */
        #lobby, #modal-overlay { position: fixed; inset: 0; z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(5,7,10,0.9); backdrop-filter: blur(10px); }
        .modal-content { width: 500px; padding: 40px; background: var(--bg-panel); border: 1px solid var(--border); border-radius: 20px; text-align: center; }
        
        #admin-panel { position: fixed; top: 50px; left: 50%; transform: translateX(-50%); background: #111; border: 2px solid #a855f7; padding: 20px; border-radius: 12px; z-index: 9999; display: none; box-shadow: 0 0 30px rgba(168,85,247,0.4); width: 400px; }
        #admin-panel h3 { color: #a855f7; margin-bottom: 15px; font-weight: 900; }

        .up { color: var(--up); } .down { color: var(--down); } .dim { color: var(--text-dim); } .price-text { font-family: 'JetBrains Mono', monospace; font-weight: 700; }
    </style>
</head>
<body>

<div id="lobby">
    <h1 style="font-family:'Black Han Sans'; font-size:7rem; color:var(--primary); margin:0; text-shadow:0 0 40px rgba(246,184,25,0.3);">주식의 신</h1>
    <p style="color:var(--text-dim); font-weight:800; letter-spacing:12px; margin-bottom:50px;">ULTIMATE EDITION</p>
    <button class="btn btn-primary" style="width:260px; font-size:1.2rem; padding:20px;" onclick="Engine.start()">접속하기 (ENTER)</button>
</div>

<div id="modal-overlay" style="display:none;">
    <div class="modal-content">
        <h2 style="color:var(--primary); margin-bottom:20px;">DAY <span id="modal-day"></span> 장 마감</h2>
        <div id="news-list" style="margin-bottom: 25px; text-align:left; font-size:0.9rem; line-height:1.5;"></div>
        <button class="btn btn-primary" style="width:100%;" onclick="Engine.nextDay()">다음 거래일 시작</button>
    </div>
</div>

<div id="admin-panel">
    <h3>[ADMIN] 시장 조작 패널</h3>
    <select id="admin-target" style="margin-bottom:10px;"></select>
    <div style="display:flex; gap:10px;">
        <button class="btn" style="flex:1; background:var(--up); color:#fff;" onclick="Admin.manipulate('pump')">강제 떡상 (Pump)</button>
        <button class="btn" style="flex:1; background:var(--down); color:#fff;" onclick="Admin.manipulate('dump')">강제 떡락 (Dump)</button>
    </div>
    <p style="color:#666; font-size:0.75rem; margin-top:10px; text-align:center;">`~` 키를 눌러 닫기</p>
</div>

<div id="app-layout">
    <div class="ticker-wrap"><div class="ticker-move" id="ui-ticker">실시간 속보가 없습니다. 평화로운 시장입니다.</div></div>
    <div class="main-container">
        
        <aside class="sidebar-left">
            <div style="padding:25px 20px; border-bottom:1px solid var(--border);">
                <div style="color:var(--primary); font-weight:900; font-size:1.1rem;">MARKET DAY <span id="ui-day" style="font-size:1.5rem;">1</span></div>
            </div>
            <div id="ui-stock-list" style="overflow-y:auto; flex:1; padding:10px;"></div>
        </aside>

        <main class="center-viewport">
            <div class="price-header">
                <div>
                    <div id="ui-cur-name" style="font-weight:900; color:var(--text-dim);">STOCK</div>
                    <div id="ui-cur-price">0</div>
                    <div id="ui-cur-diff">0.00%</div>
                </div>
                <div style="text-align:right;">
                    <div class="dim" style="font-weight:800; font-size:0.85rem;">MARKET CLOSE</div>
                    <div id="ui-timer">30s</div>
                </div>
            </div>
            <div class="chart-container"><canvas id="chart-canvas"></canvas></div>
        </main>

        <aside class="sidebar-right">
            <div class="panel-section">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <p class="dim" style="font-weight:800; font-size:0.8rem;">CASH (예수금)</p>
                    <button class="btn btn-loan" style="padding:6px 12px; font-size:0.7rem;" onclick="Trading.takeLoan()">대출받기</button>
                </div>
                <div id="ui-cash" class="asset-val" style="margin:5px 0;">0</div>
                <p class="dim" style="font-weight:800; font-size:0.8rem; margin-top:15px;">NET WORTH (총 자산)</p>
                <div id="ui-total-asset" class="asset-val" style="color:var(--primary);">0</div>
                <div id="ui-loan-display" style="color:#a855f7; font-size:0.8rem; font-weight:700; margin-top:5px; display:none;">대출금: <span id="ui-loan-amount">0</span></div>
            </div>
            
            <div style="height:150px; overflow-y:auto; padding:15px;" id="ui-portfolio"></div>
            
            <div class="panel-section" style="border-top:1px solid var(--border); flex:1; display:flex; flex-direction:column;">
                <p class="dim" style="font-weight:800; font-size:0.8rem; margin-bottom:10px;">CLASS LEADERBOARD</p>
                <div id="ui-leaderboard" style="flex:1; overflow-y:auto;"></div>
            </div>

            <div style="padding:20px; background:var(--bg-panel); border-top:1px solid var(--border);">
                <input type="number" id="trade-qty" value="10" placeholder="수량">
                <div style="display:flex; gap:10px;">
                    <button class="btn btn-up" style="flex:1;" onclick="Trading.execute('buy')">매수</button>
                    <button class="btn btn-down" style="flex:1;" onclick="Trading.execute('sell')">매도</button>
                </div>
            </div>
        </aside>

    </div>
</div>

<script>
// [1. 시장 데이터]
const Stocks = {
    list: {},
    data: [
        { n: "삼성전자", p: 75000, r: 0.012, t: "우량주" },
        { n: "엔비디아", p: 400000, r: 0.035, t: "성장주" },
        { n: "비트코인", p: 80000, r: 0.15, t: "크립토" },
        { n: "도지코인", p: 300, r: 0.25, t: "밈코인" },
        { n: "테슬라", p: 250000, r: 0.045, t: "성장주" },
        { n: "에코프로", p: 150000, r: 0.06, t: "테마주" }
    ],
    init() {
        this.data.forEach(item => {
            this.list[item.n] = { name: item.n, price: item.p, basePrice: item.p, history: Array(40).fill(item.p), owned: 0, avgPrice: 0, vol: item.r, tier: item.t, momentum: 0 };
        });
    },
    update() {
        Object.values(this.list).forEach(s => {
            let multiplier = (s.tier === "크립토" || s.tier === "밈코인") ? 2.5 : 1.0;
            // 모멘텀(뉴스/어드민) 반영
            let change = (Math.random() * s.vol * 2 - s.vol) * multiplier + s.momentum;
            s.price = Math.max(10, Math.floor(s.price * (1 + change)));
            s.history.push(s.price); s.history.shift();
            // 모멘텀 점진적 감소
            s.momentum = s.momentum * 0.8; 
            if(Math.abs(s.momentum) < 0.01) s.momentum = 0;
        });
    }
};

// [2. 거래 및 자산]
const Trading = {
    cash: 10000000, loan: 0,
    execute(type) {
        const s = Stocks.list[Engine.currentStock], qty = parseInt(document.getElementById('trade-qty').value);
        if(!s || isNaN(qty) || qty <= 0) return;
        const total = s.price * qty;
        if(type === 'buy') {
            if(this.cash < total) return alert("현금이 부족합니다!");
            this.cash -= total;
            s.avgPrice = ((s.avgPrice * s.owned) + total) / (s.owned + qty);
            s.owned += qty;
        } else {
            if(s.owned < qty) return alert("보유 수량이 부족합니다!");
            this.cash += total; s.owned -= qty; if(s.owned === 0) s.avgPrice = 0;
        }
        UI.renderAssets();
    },
    takeLoan() {
        if(this.loan > 0) return alert("이미 대출을 받으셨습니다. (1회 한정)");
        let maxLoan = this.getTotalAsset() * 0.5; // 자산의 50%
        if(confirm(`최대 ₩${maxLoan.toLocaleString()} 대출 가능합니다. 진행하시겠습니까?`)) {
            this.loan = maxLoan;
            this.cash += maxLoan;
            UI.renderAssets();
        }
    },
    getTotalAsset() {
        let t = this.cash; Object.values(Stocks.list).forEach(s => t += s.price * s.owned); return t - this.loan;
    }
};

// [3. 가상 리더보드 (31명 클래스 시뮬레이션)]
const Leaderboard = {
    bots: [],
    init() {
        const names = ["김민수","이서준","박도윤","최예준","정시우","강하준","조주원","윤지호","장지훈","임준우","한건우","오서진","서동현","신우진","권연우","황재윤","안현석","송태윤","전민찬","홍승현"];
        for(let i=0; i<30; i++) this.bots.push({ name: names[i%names.length]+(i>19?i:''), asset: 10000000 });
    },
    update() {
        this.bots.forEach(b => {
            // 봇들은 랜덤하게 자산이 변동됨 (도박성향 봇, 안전성향 봇 등)
            let risk = Math.random() * 0.1 - 0.04; // -4% ~ +6%
            b.asset = Math.floor(b.asset * (1 + risk));
        });
    },
    render() {
        let players = [...this.bots, { name: "MY ACCOUNT (나)", asset: Trading.getTotalAsset(), isMe: true }];
        players.sort((a,b) => b.asset - a.asset);
        
        const lb = document.getElementById('ui-leaderboard'); lb.innerHTML = '';
        players.slice(0, 15).forEach((p, idx) => {
            lb.innerHTML += `<div class="leaderboard-item" style="${p.isMe ? 'color:var(--primary); font-weight:900; background:rgba(246,184,25,0.1);' : ''}">
                <span>${idx+1}. ${p.name}</span> <span class="price-text">₩${p.asset.toLocaleString()}</span>
            </div>`;
        });
    }
};

// [4. UI 및 차트]
const UI = {
    chart: null,
    init() {
        const ctx = document.getElementById('chart-canvas').getContext('2d');
        this.chart = new Chart(ctx, {
            type: 'line',
            data: { labels: Array(40).fill(''), datasets: [{ data: [], borderColor: '#f6465d', borderWidth: 3, fill: true, backgroundColor: 'rgba(246, 70, 93, 0.1)', tension: 0.1, pointRadius: 0 }] },
            options: { responsive: true, maintainAspectRatio: false, scales: { x: { display: false }, y: { position: 'right', grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#848e9c', font: {family: 'JetBrains Mono', weight:'bold'} } } }, plugins: { legend: false }, animation: false }
        });
        
        const adminSel = document.getElementById('admin-target');
        Stocks.data.forEach(d => adminSel.innerHTML += `<option value="${d.n}">${d.n}</option>`);
    },
    renderMarket() {
        const container = document.getElementById('ui-stock-list'); container.innerHTML = '';
        Object.values(Stocks.list).forEach(s => {
            const div = document.createElement('div');
            div.className = `stock-card ${s.name === Engine.currentStock ? 'active' : ''}`;
            div.onclick = () => { Engine.currentStock = s.name; this.renderMarket(); this.updateChart(); };
            div.innerHTML = `
                <div><b style="font-size:0.95rem;">${s.name}</b><br><span class="tier-tag" style="margin-top:4px; display:inline-block;">${s.tier}</span></div>
                <div class="price-text ${s.price>=s.basePrice?'up':'down'}" style="font-size:1.1rem;">${s.price.toLocaleString()}</div>`;
            container.appendChild(div);
        });
    },
    updateChart() {
        const s = Stocks.list[Engine.currentStock]; if(!s) return;
        const diff = ((s.price - s.basePrice) / s.basePrice * 100).toFixed(2);
        const isUp = diff >= 0;
        
        document.getElementById('ui-cur-name').innerText = s.name;
        document.getElementById('ui-cur-price').innerText = s.price.toLocaleString();
        document.getElementById('ui-cur-diff').innerText = (isUp ? '+' : '') + diff + '%';
        document.getElementById('ui-cur-diff').className = isUp ? 'up' : 'down';
        
        this.chart.data.datasets[0].data = s.history;
        this.chart.data.datasets[0].borderColor = isUp ? 'var(--up)' : 'var(--down)';
        this.chart.data.datasets[0].backgroundColor = isUp ? 'rgba(246,70,93,0.1)' : 'rgba(51,136,255,0.1)';
        
        const minVal = Math.min(...s.history), maxVal = Math.max(...s.history);
        this.chart.options.scales.y.min = minVal - (maxVal-minVal)*0.1;
        this.chart.options.scales.y.max = maxVal + (maxVal-minVal)*0.1;
        this.chart.update();
    },
    renderAssets() {
        document.getElementById('ui-cash').innerText = "₩" + Trading.cash.toLocaleString();
        document.getElementById('ui-total-asset').innerText = "₩" + Trading.getTotalAsset().toLocaleString();
        
        if(Trading.loan > 0) {
            document.getElementById('ui-loan-display').style.display = 'block';
            document.getElementById('ui-loan-amount').innerText = "₩" + Trading.loan.toLocaleString();
        }

        const port = document.getElementById('ui-portfolio'); port.innerHTML = '';
        Object.values(Stocks.list).forEach(s => {
            if(s.owned > 0) {
                const profit = ((s.price - s.avgPrice) / s.avgPrice * 100).toFixed(2);
                port.innerHTML += `<div class="port-item">
                    <div><b>${s.name}</b> <span class="dim" style="font-size:0.75rem;">${s.owned}주</span></div>
                    <div class="price-text ${profit>=0?'up':'down'}">${profit}%</div>
                </div>`;
            }
        });
        document.getElementById('ui-timer').innerText = Engine.timeLeft + "s";
    }
};

// [5. 게임 엔진 및 관리자]
const Admin = {
    isOpen: false,
    toggle() { 
        this.isOpen = !this.isOpen; 
        document.getElementById('admin-panel').style.display = this.isOpen ? 'block' : 'none'; 
    },
    manipulate(type) {
        const name = document.getElementById('admin-target').value;
        if(!Stocks.list[name]) return;
        // 강제로 엄청난 모멘텀 부여
        Stocks.list[name].momentum = type === 'pump' ? 0.3 : -0.3; 
        document.getElementById('ui-ticker').innerText = `🚨 [단독] ${name}, 시장을 뒤흔드는 엄청난 내부 정보 유출! 주가 폭동 예상!`;
    }
};

document.addEventListener('keydown', (e) => { if(e.key === '`' || e.key === '~') Admin.toggle(); });

const Engine = {
    day: 1, timeLeft: 30, isLive: false, currentStock: '삼성전자',
    start() {
        Stocks.init(); Leaderboard.init(); UI.init(); this.resetDay();
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('app-layout').style.display = 'flex';
        this.isLive = true; setInterval(() => this.tick(), 1000);
    },
    resetDay() { this.timeLeft = 30; Object.values(Stocks.list).forEach(s => s.basePrice = s.price); },
    tick() { 
        if(!this.isLive) return; 
        this.timeLeft--; 
        if(this.timeLeft <= 0) return this.endDay(); 
        Stocks.update(); Leaderboard.update();
        UI.renderMarket(); UI.updateChart(); UI.renderAssets(); Leaderboard.render();
    },
    endDay() {
        this.isLive = false;
        document.getElementById('modal-day').innerText = this.day;
        
        const list = document.getElementById('news-list'); list.innerHTML = '';
        const target = Stocks.data[Math.floor(Math.random() * Stocks.data.length)].n;
        const isGood = Math.random() > 0.5;
        
        // 내일 시장에 반영될 모멘텀 세팅
        Stocks.list[target].momentum = isGood ? 0.15 : -0.15;
        list.innerHTML = `<div style="padding:15px; background:#1a1e2b; border-radius:8px; border-left:4px solid ${isGood?'var(--up)':'var(--down)'}">
            <b class="${isGood?'up':'down'}">[내일의 찌라시] ${target}</b><br>
            ${isGood ? '외국인 대규모 매수세 유입 포착. 내일 강한 상승 돌파 예상!' : '어닝 쇼크 우려 및 기관 대량 매도 전환. 내일 급락 주의!'}
        </div>`;
        document.getElementById('ui-ticker').innerText = `[뉴스] ${target}, ${isGood?'호재':'악재'} 발생으로 시장 관심 집중...`;
        
        document.getElementById('modal-overlay').style.display = 'flex';
    },
    nextDay() {
        // 대출 이자 차감 (일 1%)
        if(Trading.loan > 0) {
            const interest = Math.floor(Trading.loan * 0.01);
            Trading.cash -= interest;
            alert(`[대출 이자] 전일 대출 이자로 ₩${interest.toLocaleString()} 가 차감되었습니다.`);
        }

        this.day++; if(this.day > 30) { alert("🏆 30일 투자 대회 종료!\n당신의 최종 자산: ₩" + Trading.getTotalAsset().toLocaleString()); location.reload(); }
        document.getElementById('ui-day').innerText = this.day;
        this.resetDay(); document.getElementById('modal-overlay').style.display = 'none';
        this.isLive = true;
    }
};
</script>
</body>
</html>
